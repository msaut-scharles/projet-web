<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Upload</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="username-banner" class="username-banner" aria-live="polite"></div>
    <main class="page-shell">
      <div class="card">
        <div class="brand">
          <span class="brand__mark">✍️</span>
          <div>
            <h1>Upload your text</h1>
            <p class="meta">Submit a message and review all received entries on the submissions page.</p>
          </div>
        </div>

        <form method="POST" action="/upload" class="form-grid" enctype="multipart/form-data">
          <div id="username-section">{{usernameSection}}</div>

          <div class="form-group">
            <label for="text">Enter your text below</label>
            <textarea id="text" name="text" placeholder="Type or paste your text here..."></textarea>
          </div>

          <div class="form-group file-picker">
            <input id="media" name="media" type="file" accept="image/*,video/*" />
            <label class="file-picker__button" for="media">Choose file</label>
            <span class="file-picker__name">No file selected</span>
          </div>

          <button type="submit">Send text or media</button>
        </form>

        <div class="footer-links">
          <a class="button-link" href="/submissions">View all submissions</a>
          <a class="button-link" href="/chat">Open chat interface</a>
        </div>
      </div>
    </main>

    <script>
      function readCookie(name) {
        const match = document.cookie.match('(^|;)\\s*' + name + '=([^;]+)');
        return match ? decodeURIComponent(match[2]) : '';
      }

      const username = readCookie('username');
      const banner = document.getElementById('username-banner');
      const usernameInput = document.getElementById('senderUsername');

      if (username) {
        banner.textContent = 'Signed in as ' + username;
      }

      if (usernameInput && username) {
        usernameInput.value = username;
      }

      const fileInput = document.getElementById('media');
      const fileNameDisplay = document.querySelector('.file-picker__name');
      if (fileInput && fileNameDisplay) {
        fileInput.addEventListener('change', () => {
          fileNameDisplay.textContent = fileInput.files.length
            ? fileInput.files[0].name
            : 'No file selected';
        });
      }
    </script>
  </body>
</html>
